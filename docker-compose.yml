# InferSched infrastructure: Kafka (KRaft, no ZooKeeper), Redis, PostgreSQL.
# These back the durable/distributed phases (P5+). Earlier phases run the Engine
# core in-process and do not require any of these to be up.
#
#   docker compose up -d
#   docker compose down -v      # -v also drops the postgres volume

services:
  kafka:
    image: apache/kafka:3.7.2
    container_name: infersched-kafka
    ports:
      - "9092:9092"   # host clients
    environment:
      # --- KRaft single-node (broker + controller) ---
      KAFKA_NODE_ID: "1"
      KAFKA_PROCESS_ROLES: "broker,controller"
      KAFKA_CONTROLLER_QUORUM_VOTERS: "1@kafka:9093"
      KAFKA_CONTROLLER_LISTENER_NAMES: "CONTROLLER"
      KAFKA_LISTENERS: "PLAINTEXT://:9094,CONTROLLER://:9093,EXTERNAL://:9092"
      KAFKA_ADVERTISED_LISTENERS: "PLAINTEXT://kafka:9094,EXTERNAL://localhost:9092"
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: "CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,EXTERNAL:PLAINTEXT"
      KAFKA_INTER_BROKER_LISTENER_NAME: "PLAINTEXT"
      # Multiple partitions make multi-Router consumer-group sharding
      # exercisable on a single broker.
      KAFKA_NUM_PARTITIONS: "12"
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: "1"
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: "1"
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: "1"
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 12
    volumes:
      - kafka-data:/var/lib/kafka/data

  redis:
    image: redis:7-alpine
    container_name: infersched-redis
    command: ["redis-server", "--save", "", "--appendonly", "no"]  # ephemeral by design
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  postgres:
    image: postgres:16-alpine
    container_name: infersched-postgres
    environment:
      POSTGRES_USER: infersched
      POSTGRES_PASSWORD: infersched
      POSTGRES_DB: infersched
    ports:
      - "55432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U infersched -d infersched"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - postgres-data:/var/lib/postgresql/data

volumes:
  kafka-data:
  postgres-data:
